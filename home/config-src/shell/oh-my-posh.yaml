$schema: https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
version: 3
final_space: true
console_title_template: '{{ .Shell }} in {{ .Folder }}'

# Minimal theme: plain-style segments, no background swatches anywhere —
# every segment paints foreground text only, so the prompt is just colored
# text on your terminal's own background. Palette matches the Tokyo Night
# theme shared by Ghostty, fish's syntax highlighting, and zellij, so the
# whole terminal environment reads as one thing.
#
# Single left-aligned block only - fish's fish_right_prompt anchors to the
# END of whatever fish_prompt renders, which for this prompt is the second
# line (the bare "❯ "), not the first. A right-aligned block here doesn't
# render next to the path/git line like you'd expect; it renders squeezed
# onto the same line you type on. Not worth the confusion for a clock.
palette:
  blue: "#7aa2f7"
  yellow: "#e0af68"
  red: "#f7768e"
  muted: "#565f89"

blocks:
  - type: prompt
    alignment: left
    segments:
      - type: path
        style: plain
        foreground: p:blue
        properties:
          style: agnoster_short
          max_depth: 3
        template: "{{ .Path }} "

      - type: git
        style: plain
        foreground: p:yellow
        properties:
          fetch_status: true
        template: "{{ .HEAD }}{{ if .Working.Changed }} *{{ end }}{{ if .Staging.Changed }} +{{ end }} "

      - type: executiontime
        style: plain
        foreground: p:muted
        properties:
          threshold: 500
        template: " {{ .FormattedMs }}"

      - type: status
        style: plain
        foreground: p:red
        properties:
          always_enabled: false
        template: " ✗{{ .Code }}"

      - type: text
        style: plain
        foreground: p:blue
        template: "\n❯ "

transient_prompt:
  foreground: p:blue
  template: "❯ "
