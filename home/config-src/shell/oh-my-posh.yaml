$schema: https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
version: 3
final_space: true
console_title_template: '{{ .Shell }} in {{ .Folder }}'

# Minimal theme: plain-style segments, no background swatches anywhere —
# every segment paints foreground text only, so the prompt is just colored
# text on your terminal's own background. Palette matches the Tokyo Night
# theme shared by Ghostty, fish's syntax highlighting, and zellij, so the
# whole terminal environment reads as one thing.
palette:
  blue: "#7aa2f7"
  green: "#9ece6a"
  yellow: "#e0af68"
  cyan: "#7dcfff"
  red: "#f7768e"
  muted: "#565f89"

blocks:
  - type: prompt
    alignment: left
    segments:
      - type: path
        style: plain
        foreground: p:blue
        properties:
          style: agnoster_short
          max_depth: 3
        template: "{{ .Path }} "

      - type: git
        style: plain
        foreground: p:yellow
        properties:
          fetch_status: true
        template: "{{ .HEAD }}{{ if .Working.Changed }} *{{ end }}{{ if .Staging.Changed }} +{{ end }} "

      - type: node
        style: plain
        foreground: p:green
        template: " {{ .Full }} "

      - type: python
        style: plain
        foreground: p:cyan
        template: " {{ .Full }} "

      - type: status
        style: plain
        foreground: p:red
        properties:
          always_enabled: false
        template: " ✗{{ .Code }}"

      - type: text
        style: plain
        foreground: p:blue
        template: "\n❯ "

  # Right-aligned: how long the last command took (only above the
  # threshold) and the clock, both muted so they read as ambient
  # info, not competing with the left side.
  - type: prompt
    alignment: right
    segments:
      - type: executiontime
        style: plain
        foreground: p:muted
        properties:
          threshold: 500
        template: "{{ .FormattedMs }} "

      - type: time
        style: plain
        foreground: p:muted
        options:
          time_format: "15:04"

transient_prompt:
  foreground: p:blue
  template: "❯ "
