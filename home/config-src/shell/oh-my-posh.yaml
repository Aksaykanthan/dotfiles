$schema: https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
version: 3
final_space: true
console_title_template: '{{ .Shell }} in {{ .Folder }}'

# Minimal theme: plain-style segments, no background swatches anywhere —
# every segment paints foreground text only, so the prompt is just colored
# text on your terminal's own background.
blocks:
  - type: prompt
    alignment: left
    segments:
      - type: path
        style: plain
        foreground: "#61AFEF"
        properties:
          style: agnoster_short
          max_depth: 3
        template: "{{ .Path }} "

      - type: git
        style: plain
        foreground: "#E5C07B"
        properties:
          fetch_status: true
        template: "{{ .HEAD }}{{ if .Working.Changed }} *{{ end }}{{ if .Staging.Changed }} +{{ end }} "

      - type: node
        style: plain
        foreground: "#98C379"
        template: " {{ .Full }} "

      - type: python
        style: plain
        foreground: "#56B6C2"
        template: " {{ .Full }} "

      - type: executiontime
        style: plain
        foreground: "#5C6370"
        properties:
          threshold: 500
        template: " {{ .FormattedMs }}"

      - type: status
        style: plain
        foreground: "#E06C75"
        properties:
          always_enabled: false
        template: " ✗{{ .Code }}"

      - type: text
        style: plain
        foreground: "#61AFEF"
        template: "\n❯ "

transient_prompt:
  foreground: "#61AFEF"
  template: "❯ "
